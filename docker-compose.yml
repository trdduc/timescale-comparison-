version: '3.8'

services:
  timescale_db:
    image: timescale/timescaledb:latest-pg15
    container_name: timescale_db
    environment:
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=timescale_db
    ports:
      - "5433:5432"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M
        reservations:
          memory: 1024M

  postgres_db:
    image: postgres:15
    container_name: postgres_db
    environment:
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=postgres_db
    ports:
      - "5434:5432"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M
        reservations:
          memory: 1024M


  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_gui
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "8080:80"
    depends_on:
      - timescale_db
      - postgres_db


  python_lab:
    build: .
    container_name: python_lab
    volumes:
      - .:/app
    depends_on:
      - timescale_db
      - postgres_db
